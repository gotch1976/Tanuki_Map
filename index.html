<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たぬきマップ | Tanuki Map</title>

  <!-- カスタムCSS -->
  <link rel="stylesheet" href="css/main.css?v=26">
  <link rel="stylesheet" href="css/map.css?v=26">

  <!-- PWA設定 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8B4513">
</head>
<body>
  <!-- ヘッダー -->
  <header>
    <div class="header-container">
      <div class="header-left">
        <h1><img src="img/tanuki-marker.png" alt="たぬき" style="width: 24px; height: 24px; vertical-align: middle;"> たぬきマップ</h1>
        <nav class="header-nav">
          <button id="reloadBtn" class="header-icon-btn" title="マップを更新"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
          <button id="listViewBtn" class="header-icon-btn" title="リストで見る"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
          <button id="mypageBtn" class="header-icon-btn" title="マイページ" style="display: none;"><svg width="18" height="18" viewBox="0 0 24 24" fill="white" stroke="none"><circle cx="12" cy="16" r="4"/><circle cx="6" cy="8" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="9" cy="5" r="1.5"/><circle cx="15" cy="5" r="1.5"/></svg></button>
        </nav>
      </div>
    </div>
  </header>

  <!-- 右上固定のユーザー情報 -->
  <div class="user-fixed">
    <div id="userInfo" style="display: none;">
      <img id="userPhoto" alt="User" class="user-photo">
      <button id="logoutBtn" class="btn-logout">ログアウト</button>
    </div>
    <button id="loginBtn" class="btn-login">ログイン</button>
  </div>

  <!-- 地図コンテナ -->
  <div id="map"></div>

  <!-- たぬき追加ボタン(ログイン時のみ表示) -->
  <button id="addTanukiBtn" class="fab" style="display: none;" title="たぬきを追加">
    ➕
  </button>

  <!-- たぬき追加モーダル -->
  <div id="addTanukiModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">たぬきを追加</h2>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <form id="tanukiForm">
        <div class="form-group">
          <label for="photoInput">📸 写真 *</label>
          <input type="file" id="photoInput" accept="image/*,.heic,.heif">
          <div id="photoPreview"></div>
        </div>

        <div class="form-group">
          <label for="episodeInput">📍 場所（タイトル） *</label>
          <textarea id="episodeInput" rows="2" placeholder="例: 愛知県の某デニーズ前" required></textarea>
        </div>

        <div class="form-group">
          <label for="characteristicsInput">📖 特徴／エピソード(オプション)</label>
          <textarea id="characteristicsInput" rows="3" placeholder="赤スカーフのたぬき、発見時のストーリーなど"></textarea>
        </div>

        <div class="form-group">
          <label for="noteUrlInput">🔗 note記事URL(オプション)</label>
          <input type="url" id="noteUrlInput" placeholder="https://note.com/...">
          <small>既にnoteで記事を書いている場合、URLを入力してください</small>
        </div>

        <div class="form-group">
          <label for="discoveryDateInput">📅 発見日(オプション)</label>
          <input type="date" id="discoveryDateInput">
        </div>

        <div class="form-group">
          <label>📍 位置情報</label>
          <p id="locationInfo">地図をクリックするか、現在地を取得してください</p>
          <button type="button" id="getCurrentLocation" class="btn-secondary">現在地を取得</button>
        </div>

        <input type="hidden" id="latitudeInput">
        <input type="hidden" id="longitudeInput">
        <input type="hidden" id="tanukiId">

        <div class="form-group">
          <label for="userNameInput">👤 投稿者名</label>
          <input type="text" id="userNameInput" placeholder="表示する名前を入力（空欄で匿名）">
          <small>空欄の場合は「匿名」と表示されます</small>
        </div>

        <div class="form-group" id="initialRatingGroup">
          <label>⭐ 評価（任意）</label>
          <p style="font-size: 0.9em; color: #666; margin-bottom: 8px;">このたぬきの評価を設定できます</p>
          <div class="star-rating" id="initialStarRating">
            <span class="star" data-value="1">☆</span>
            <span class="star" data-value="2">☆</span>
            <span class="star" data-value="3">☆</span>
            <span class="star" data-value="4">☆</span>
            <span class="star" data-value="5">☆</span>
          </div>
          <input type="hidden" id="initialRatingInput" value="0">
        </div>

        <div class="form-group" id="shopCheckGroup">
          <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
            <input type="checkbox" id="isShopCheckbox" style="width: 18px; height: 18px;">
            🏪 このたぬきは購入できる（ショップ・お土産屋など）
          </label>
        </div>

        <div class="form-group" id="placeSelectGroup">
          <label>🏬 施設／店舗情報（オプション）</label>
          <div id="selectedPlaceInfo" style="display: none; padding: 10px; background: #f5f5f5; border-radius: 8px; margin-bottom: 10px;">
            <span id="selectedPlaceName"></span>
            <button type="button" id="clearPlaceBtn" class="btn-small" style="margin-left: 10px;">✕ 解除</button>
          </div>
          <div style="display: flex; gap: 8px; margin-bottom: 8px;">
            <input type="text" id="placeSearchInput" placeholder="施設／店舗名を入力" style="flex: 1;">
            <button type="button" id="searchPlaceBtn" class="btn-secondary" style="white-space: nowrap;">🔍 検索</button>
          </div>
          <div id="placeSearchResults" style="display: none; max-height: 150px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px;"></div>
          <button type="button" id="selectPlaceFromMapBtn" class="btn-secondary" style="margin-top: 8px;">🗺️ 地図から施設／店舗を選択</button>
          <small>地図にPOIがない場合は施設／店舗名で検索してください</small>
          <input type="hidden" id="placeIdInput">
          <input type="hidden" id="placeNameInput">
        </div>

        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelBtn">キャンセル</button>
          <button type="submit" class="btn-primary" id="submitBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ローディング -->
  <div id="loading" class="loading">
    読み込み中...
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

  <!-- アプリのJavaScript (Google Maps APIより先に読み込む) -->
  <script src="js/config.js?v=26"></script>
  <script src="js/utils.js?v=26"></script>
  <script src="js/firebase-init.js?v=26"></script>
  <script src="js/auth.js?v=26"></script>
  <script src="js/add-tanuki.js?v=26"></script>
  <script src="js/map.js?v=26"></script>

  <!-- MarkerClusterer ライブラリ -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

  <!-- Google Maps JavaScript API (コールバック関数が定義された後に読み込む) -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA_djMpDkNHMKX7CPsK81m8TSVB42gC6gw&libraries=places&callback=initializeApp"></script>
</body>
</html>
